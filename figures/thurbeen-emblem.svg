<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Legendary gold/bronze gradients -->
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#DAA520;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </radialGradient>
    
    <linearGradient id="bladeMetal1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DAA520;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="bladeMetal2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CD7F32;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B8860B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6914;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="energyGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#DAA520;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="shieldGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#8B6914;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#654321;stop-opacity:1" />
    </radialGradient>
    
    <!-- Dramatic shadow filters -->
    <filter id="dramaticShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="3" dy="3" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.6"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="0" result="offsetblur"/>
      <feFlood flood-color="#FFD700" flood-opacity="0.8"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="out" result="inverse"/>
      <feFlood flood-color="#FFA500" flood-opacity="0.9" result="color"/>
      <feComposite in="color" in2="inverse" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark background -->
  <rect width="400" height="400" fill="#0F0F1E"/>
  
  <!-- Background energy field -->
  <circle cx="200" cy="200" r="160" fill="url(#coreGlow)" opacity="0.1" filter="url(#glow)"/>
  
  <!-- Outer battle ring -->
  <circle cx="200" cy="200" r="130" fill="none" stroke="url(#energyGlow)" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  
  <!-- Rotating shield emblems in background -->
  <g opacity="0.25">
    <animateTransform 
      attributeName="transform"
      attributeType="XML"
      type="rotate"
      from="0 200 200"
      to="-360 200 200"
      dur="20s"
      repeatCount="indefinite"/>
    
    <path d="M 200 90 L 210 100 L 210 115 L 200 125 L 190 115 L 190 100 Z" fill="url(#shieldGrad)" stroke="#FFD700" stroke-width="1"/>
    <path d="M 200 90 L 210 100 L 210 115 L 200 125 L 190 115 L 190 100 Z" fill="url(#shieldGrad)" stroke="#FFD700" stroke-width="1" transform="rotate(90 200 200)"/>
    <path d="M 200 90 L 210 100 L 210 115 L 200 125 L 190 115 L 190 100 Z" fill="url(#shieldGrad)" stroke="#FFD700" stroke-width="1" transform="rotate(180 200 200)"/>
    <path d="M 200 90 L 210 100 L 210 115 L 200 125 L 190 115 L 190 100 Z" fill="url(#shieldGrad)" stroke="#FFD700" stroke-width="1" transform="rotate(270 200 200)"/>
  </g>
  
  <!-- Main weapon wheel/turbine (rotating blades like throwing stars) -->
  <g filter="url(#dramaticShadow)">
    <animateTransform 
      attributeName="transform"
      attributeType="XML"
      type="rotate"
      from="0 200 200"
      to="360 200 200"
      dur="6s"
      repeatCount="indefinite"/>
    
    <!-- 8 blade design with sharp angular edges -->
    <g>
      <!-- Blade 1 - Sharp tactical blade shape -->
      <path d="M 200 200 L 190 85 L 200 70 L 220 75 L 235 95 L 208 180 Z" 
            fill="url(#bladeMetal1)" 
            stroke="#654321" 
            stroke-width="1.5"/>
      <path d="M 200 80 L 210 90 L 202 175" 
            fill="none" 
            stroke="#FFE4B5" 
            stroke-width="1.5" 
            opacity="0.6"/>
      
      <!-- Blade 2 -->
      <path d="M 200 200 L 190 85 L 200 70 L 220 75 L 235 95 L 208 180 Z" 
            fill="url(#bladeMetal1)" 
            stroke="#654321" 
            stroke-width="1.5"
            transform="rotate(45 200 200)"/>
      <path d="M 200 80 L 210 90 L 202 175" 
            fill="none" 
            stroke="#FFE4B5" 
            stroke-width="1.5" 
            opacity="0.6"
            transform="rotate(45 200 200)"/>
      
      <!-- Blade 3 -->
      <path d="M 200 200 L 190 85 L 200 70 L 220 75 L 235 95 L 208 180 Z" 
            fill="url(#bladeMetal2)" 
            stroke="#654321" 
            stroke-width="1.5"
            transform="rotate(90 200 200)"/>
      <path d="M 200 80 L 210 90 L 202 175" 
            fill="none" 
            stroke="#CD7F32" 
            stroke-width="1.5" 
            opacity="0.7"
            transform="rotate(90 200 200)"/>
      
      <!-- Blade 4 -->
      <path d="M 200 200 L 190 85 L 200 70 L 220 75 L 235 95 L 208 180 Z" 
            fill="url(#bladeMetal1)" 
            stroke="#654321" 
            stroke-width="1.5"
            transform="rotate(135 200 200)"/>
      <path d="M 200 80 L 210 90 L 202 175" 
            fill="none" 
            stroke="#FFE4B5" 
            stroke-width="1.5" 
            opacity="0.6"
            transform="rotate(135 200 200)"/>
      
      <!-- Blade 5 -->
      <path d="M 200 200 L 190 85 L 200 70 L 220 75 L 235 95 L 208 180 Z" 
            fill="url(#bladeMetal2)" 
            stroke="#654321" 
            stroke-width="1.5"
            transform="rotate(180 200 200)"/>
      <path d="M 200 80 L 210 90 L 202 175" 
            fill="none" 
            stroke="#CD7F32" 
            stroke-width="1.5" 
            opacity="0.7"
            transform="rotate(180 200 200)"/>
      
      <!-- Blade 6 -->
      <path d="M 200 200 L 190 85 L 200 70 L 220 75 L 235 95 L 208 180 Z" 
            fill="url(#bladeMetal1)" 
            stroke="#654321" 
            stroke-width="1.5"
            transform="rotate(225 200 200)"/>
      <path d="M 200 80 L 210 90 L 202 175" 
            fill="none" 
            stroke="#FFE4B5" 
            stroke-width="1.5" 
            opacity="0.6"
            transform="rotate(225 200 200)"/>
      
      <!-- Blade 7 -->
      <path d="M 200 200 L 190 85 L 200 70 L 220 75 L 235 95 L 208 180 Z" 
            fill="url(#bladeMetal2)" 
            stroke="#654321" 
            stroke-width="1.5"
            transform="rotate(270 200 200)"/>
      <path d="M 200 80 L 210 90 L 202 175" 
            fill="none" 
            stroke="#CD7F32" 
            stroke-width="1.5" 
            opacity="0.7"
            transform="rotate(270 200 200)"/>
      
      <!-- Blade 8 -->
      <path d="M 200 200 L 190 85 L 200 70 L 220 75 L 235 95 L 208 180 Z" 
            fill="url(#bladeMetal1)" 
            stroke="#654321" 
            stroke-width="1.5"
            transform="rotate(315 200 200)"/>
      <path d="M 200 80 L 210 90 L 202 175" 
            fill="none" 
            stroke="#FFE4B5" 
            stroke-width="1.5" 
            opacity="0.6"
            transform="rotate(315 200 200)"/>
    </g>
  </g>
  
  <!-- Tactical grid overlay (static) -->
  <g opacity="0.15" stroke="#B8860B" stroke-width="0.5">
    <circle cx="200" cy="200" r="100" fill="none"/>
    <circle cx="200" cy="200" r="70" fill="none"/>
    <line x1="200" y1="100" x2="200" y2="300"/>
    <line x1="100" y1="200" x2="300" y2="200"/>
    <line x1="129" y1="129" x2="271" y2="271"/>
    <line x1="271" y1="129" x2="129" y2="271"/>
  </g>
  
  <!-- Central gear mechanism -->
  <g>
    <!-- Large outer gear (rotating clockwise) -->
    <g opacity="0.9">
      <animateTransform 
        attributeName="transform"
        attributeType="XML"
        type="rotate"
        from="0 200 200"
        to="360 200 200"
        dur="10s"
        repeatCount="indefinite"/>
      
      <!-- Gear body -->
      <circle cx="200" cy="200" r="50" fill="url(#bladeMetal2)" stroke="#654321" stroke-width="2" filter="url(#dramaticShadow)"/>
      
      <!-- Gear teeth (12 teeth) -->
      <g fill="url(#bladeMetal1)" stroke="#654321" stroke-width="1">
        <rect x="195" y="150" width="10" height="8" rx="1"/>
        <rect x="195" y="150" width="10" height="8" rx="1" transform="rotate(30 200 200)"/>
        <rect x="195" y="150" width="10" height="8" rx="1" transform="rotate(60 200 200)"/>
        <rect x="195" y="150" width="10" height="8" rx="1" transform="rotate(90 200 200)"/>
        <rect x="195" y="150" width="10" height="8" rx="1" transform="rotate(120 200 200)"/>
        <rect x="195" y="150" width="10" height="8" rx="1" transform="rotate(150 200 200)"/>
        <rect x="195" y="150" width="10" height="8" rx="1" transform="rotate(180 200 200)"/>
        <rect x="195" y="150" width="10" height="8" rx="1" transform="rotate(210 200 200)"/>
        <rect x="195" y="150" width="10" height="8" rx="1" transform="rotate(240 200 200)"/>
        <rect x="195" y="150" width="10" height="8" rx="1" transform="rotate(270 200 200)"/>
        <rect x="195" y="150" width="10" height="8" rx="1" transform="rotate(300 200 200)"/>
        <rect x="195" y="150" width="10" height="8" rx="1" transform="rotate(330 200 200)"/>
      </g>
      
      <!-- Inner gear ring -->
      <circle cx="200" cy="200" r="35" fill="none" stroke="#8B6914" stroke-width="2" opacity="0.7"/>
    </g>
    
    <!-- Medium gear (counter-rotating) -->
    <g opacity="0.95">
      <animateTransform 
        attributeName="transform"
        attributeType="XML"
        type="rotate"
        from="0 200 200"
        to="-360 200 200"
        dur="15s"
        repeatCount="indefinite"/>
      
      <!-- Gear body -->
      <circle cx="200" cy="200" r="30" fill="url(#coreGlow)" stroke="#B8860B" stroke-width="2" filter="url(#innerGlow)"/>
      
      <!-- Gear teeth (8 teeth) -->
      <g fill="url(#energyGlow)" stroke="#8B6914" stroke-width="1">
        <rect x="196" y="170" width="8" height="6" rx="1"/>
        <rect x="196" y="170" width="8" height="6" rx="1" transform="rotate(45 200 200)"/>
        <rect x="196" y="170" width="8" height="6" rx="1" transform="rotate(90 200 200)"/>
        <rect x="196" y="170" width="8" height="6" rx="1" transform="rotate(135 200 200)"/>
        <rect x="196" y="170" width="8" height="6" rx="1" transform="rotate(180 200 200)"/>
        <rect x="196" y="170" width="8" height="6" rx="1" transform="rotate(225 200 200)"/>
        <rect x="196" y="170" width="8" height="6" rx="1" transform="rotate(270 200 200)"/>
        <rect x="196" y="170" width="8" height="6" rx="1" transform="rotate(315 200 200)"/>
      </g>
    </g>
    
    <!-- Center hub with glow -->
    <circle cx="200" cy="200" r="20" fill="url(#coreGlow)" filter="url(#glow)">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Center decorative bolts -->
    <circle cx="200" cy="185" r="2" fill="#654321"/>
    <circle cx="215" cy="200" r="2" fill="#654321"/>
    <circle cx="200" cy="215" r="2" fill="#654321"/>
    <circle cx="185" cy="200" r="2" fill="#654321"/>
    
    <!-- TB Initials on top of gears -->
    <text x="200" y="215" 
          font-family="'Cinzel', 'Trajan Pro', 'Palatino Linotype', serif" 
          font-size="48" 
          font-weight="900" 
          fill="#FFD700" 
          text-anchor="middle"
          stroke="#654321"
          stroke-width="2"
          filter="url(#glow)">
      TB
    </text>
  </g>
</svg>